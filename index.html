<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUTTCOIN Price</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-grain {
    position: fixed; inset: 0; z-index: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  .card {
    position: relative; z-index: 1;
    background: linear-gradient(145deg, #111111 0%, #0d0d0d 100%);
    border: 1px solid #1a1a1a;
    border-radius: 16px;
    padding: 36px 44px;
    min-width: 340px;
    box-shadow: 0 0 80px rgba(247, 147, 26, 0.04);
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid #1a1a1a;
  }

  .logo {
    width: 36px; height: 36px; border-radius: 50%;
    background: #f7931a; color: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-weight: 700; font-size: 16px;
    transform: rotate(90deg);
  }

  .token-name {
    font-weight: 700; font-size: 18px; color: #fff;
    letter-spacing: -0.02em;
  }

  .token-symbol {
    font-size: 12px; color: #555;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .price-row {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 22px;
  }

  .price {
    font-family: 'Space Mono', monospace;
    font-size: 36px; font-weight: 700;
    color: #fff; letter-spacing: -0.03em;
  }

  .change {
    font-family: 'Space Mono', monospace;
    font-size: 14px; font-weight: 700;
    padding: 3px 8px; border-radius: 6px;
  }

  .change.up { color: #00e676; background: rgba(0,230,118,0.08); }
  .change.down { color: #ff5252; background: rgba(255,82,82,0.08); }
  .change.flat { color: #555; background: rgba(85,85,85,0.08); }

  .meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px;
    padding-top: 18px; border-top: 1px solid #1a1a1a;
  }

  .meta-item label {
    display: block; font-size: 10px; color: #444;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .meta-item span {
    font-size: 14px; color: #aaa;
    font-family: 'Space Mono', monospace;
  }

  .footer {
    margin-top: 22px; text-align: center;
    font-size: 10px; color: #333;
    font-family: 'Space Mono', monospace;
  }

  .footer a { color: #555; text-decoration: none; }
  .footer a:hover { color: #f7931a; }

  .loading {
    text-align: center; padding: 40px 0;
    font-family: 'Space Mono', monospace;
    color: #333; font-size: 13px;
  }

  .dot-pulse::after {
    content: '';
    animation: dots 1.4s infinite;
  }

  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }

  .error-msg { color: #ff5252; font-size: 13px; text-align: center; padding: 20px 0; font-family: 'Space Mono', monospace; }
  .error-msg small { color: #444; display: block; margin-top: 8px; }
</style>
</head>
<body>
<div class="bg-grain"></div>
<div class="card" id="card">
  <div class="loading">
    <span class="dot-pulse">fetching price</span>
  </div>
</div>

<script>
const COIN_ID = 'buttcoin-7';
const API_URL = `https://api.coingecko.com/api/v3/simple/price?ids=${COIN_ID}&vs_currencies=usd&include_24hr_vol=true&include_24hr_change=true&include_market_cap=true&include_last_updated_at=true`;

const fmt = (n) => {
  if (n == null) return '\u2014';
  if (n >= 1) return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n === 0) return '$0.00';
  const s = n.toFixed(8).replace(/0+$/, '');
  return '$' + s;
};

const fmtCompact = (n) => {
  if (n == null) return '\u2014';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
};

async function fetchPrice() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status} - ${res.statusText}`);
    const data = await res.json();

    const coin = data[COIN_ID];
    if (!coin) throw new Error('Token not found in response');

    const price = coin.usd;
    const change24 = coin.usd_24h_change;
    const mcap = coin.usd_market_cap;
    const vol = coin.usd_24h_vol;
    const lastUpdated = coin.last_updated_at;

    const changeClass = change24 > 0 ? 'up' : change24 < 0 ? 'down' : 'flat';
    const changeSign = change24 > 0 ? '+' : '';
    const changeStr = change24 != null ? `${changeSign}${change24.toFixed(2)}%` : '\u2014';

    const updatedTime = lastUpdated
      ? new Date(lastUpdated * 1000).toLocaleTimeString()
      : new Date().toLocaleTimeString();

    document.getElementById('card').innerHTML = `
      <div class="header">
        <div class="logo">\u20bf</div>
        <div>
          <div class="token-name">Buttcoin</div>
          <div class="token-symbol">BUTTCOIN</div>
        </div>
      </div>
      <div class="price-row">
        <div class="price">${fmt(price)}</div>
        <div class="change ${changeClass}">${changeStr}</div>
      </div>
      <div class="meta">
        <div class="meta-item"><label>Market Cap</label><span>${fmtCompact(mcap)}</span></div>
        <div class="meta-item"><label>24h Volume</label><span>${fmtCompact(vol)}</span></div>
      </div>
      <div class="footer">
        Updated ${updatedTime} \u00b7 <a href="https://www.coingecko.com/en/coins/buttcoin-5" target="_blank">CoinGecko</a> \u00b7 Refreshes every 60s
      </div>
    `;

    document.title = `BUTTCOIN ${fmt(price)}`;

  } catch (err) {
    document.getElementById('card').innerHTML = `
      <div class="error-msg">
        Failed to fetch price. Try refreshing.
        <small>${err.message}</small>
        <small style="margin-top:12px; color:#555;">
          If this keeps failing from a local file, try serving it:<br>
          <code style="color:#f7931a;">python3 -m http.server</code> then open <code style="color:#f7931a;">localhost:8000</code>
        </small>
      </div>
    `;
  }
}

fetchPrice();
setInterval(fetchPrice, 60000);
</script>
</body>
</html>
